# Grieco isothermal validation cross-check using the same structural choices as the
# ISM prediction model wherever possible.
#
# Purpose:
# - Address the "validated model vs prediction model" referee concern directly.
# - Keep the lab protocol (beam geometry + dose) but switch the grain structure /
#   transport knobs to the ISM paperfit defaults.
#
# Suggested run:
#   python grieco_validation.py \
#     --base-config config_grieco_paper_iso_predmodel.yaml \
#     --temps 100 150 200 250 \
#     --replicates 20 \
#     --output results/grieco_validation_paper_iso_predmodel.csv

grain_radius_um: 0.005
site_area_angstroms_sq: 25
use_3d_lattice: true
porosity_fraction: 0.2

chemisorption_fraction: 0.40
surface_defect_fraction: 0.15

E_phys_mean_meV: 45.0
heterogeneity_E_bind_sigma_meV: 5.0
E_chem_mean_eV: 1.75
heterogeneity_E_chem_sigma_eV: 0.25

# Keep the explicit lab beam geometry for protocol fidelity.
beam_flux_total_cm2_s: 7.46e12
beam_incidence_angle_deg: 40.0
beam_dissociation_fraction: 0.7

# Match the paperfit exposure-scale stopping rule.
burnin_exposure_atoms_cm2: 3.0e15
measure_exposure_atoms_cm2: 1.5e15

gas_temperature_k: 300.0
sticking_probability: 0.5
sticking_temp_model: constant

er_cross_section_cm2: 1.1e-15
er_reaction_probability: 0.9

# High-T isothermal validation is ER-dominated, but keep the prediction-model
# transport representation for methodological consistency.
enable_LH: true
enable_diffusion: true
diffusion_mode: rate_only
diffusion_rate_cap_s: 200.0
lh_formation_mode: diffusion_limited
lh_exclude_chemisorption: false
enable_chemisorption_diffusion: false
lh_diffusion_factor: 0.5

enable_h2_blocking: false
uv_mode: continuous
uv_pulse_enabled: false
uv_flux_factor: 0.0

